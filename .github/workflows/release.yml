name: Build & Release Plugin

on:
  push:
    tags:
      - '[0-9]*'

permissions:
  contents: write

jobs:
  release:
    name: Build plugin ZIP and create release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Composer dependencies (production)
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Install npm dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Update version in plugin files
        env:
          PLUGIN_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          sed -i "s/Version:           .*/Version:           ${PLUGIN_VERSION}/" static-export-wp.php
          sed -i "s/define( 'SEWP_VERSION', '.*' );/define( 'SEWP_VERSION', '${PLUGIN_VERSION}' );/" static-export-wp.php
          sed -i "s/Stable tag: .*/Stable tag: ${PLUGIN_VERSION}/" readme.txt

      - name: Create plugin directory
        run: |
          mkdir -p dist/static-export-wp
          rsync -av \
            --exclude-from='.distignore' \
            --exclude='.phpunit.cache' \
            --exclude='dist' \
            ./ dist/static-export-wp/

      - name: Generate ZIP
        env:
          PLUGIN_VERSION: ${{ steps.version.outputs.VERSION }}
        working-directory: dist
        run: zip -r "../static-export-wp-${PLUGIN_VERSION}.zip" static-export-wp/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: static-export-wp-${{ steps.version.outputs.VERSION }}.zip
